version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: clinic_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: family_clinic
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - clinic_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clinic_backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/family_clinic?authSource=admin
      - JWT_SECRET=your_production_jwt_secret_change_this
      - FRONTEND_URL=http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - clinic_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clinic_frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:5000
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - clinic_network

volumes:
  mongodb_data:

networks:
  clinic_network:
    driver: bridge
